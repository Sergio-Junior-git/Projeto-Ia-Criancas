{% extends "base.html" %}
{% block title %}Entrar | BrincaSaber{% endblock %}
{% block content %}
<section class="auth-layout">
    <div class="welcome-panel">
        <span class="eyebrow">BrincaSaber</span>
        <h1>Aprender tambem pode virar jogo.</h1>
        <p>Escolha uma materia, ouca as perguntas e responda com poucos toques.</p>
    </div>

    <form class="auth-card" method="post">
        <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
        <h2>Entrar</h2>
        <label>
            E-mail
            <input type="email" name="email" required autocomplete="email">
        </label>
        <label>
            Senha
            <input type="password" name="password" required autocomplete="current-password">
        </label>
        <button class="primary-button big-action" type="submit">Entrar</button>
        <p class="switch-auth">Ainda nao tem conta? <a href="{{ url_for('web.register') }}">Criar cadastro</a></p>
    </form>
</section>
{% endblock %}
