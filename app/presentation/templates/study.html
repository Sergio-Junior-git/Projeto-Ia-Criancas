{% extends "base.html" %}
{% block title %}{{ topic }} | BrincaSaber{% endblock %}
{% block content %}
<section class="study-shell" data-discipline="{{ discipline_key }}" data-level="{{ level_key }}" data-topic="{{ topic }}">
    <aside class="study-side">
        <a class="back-link" href="{{ url_for('web.discipline', discipline=discipline_key) }}">Voltar</a>
        <span class="eyebrow">{{ disciplines[discipline_key].name }} | {{ levels[level_key] }}</span>
        <h1>{{ topic }}</h1>
        <div class="mode-tabs" role="tablist">
            <button class="tab active" data-target="explanationPanel">Aprender</button>
            <button class="tab" data-target="activityPanel">Jogar</button>
        </div>
    </aside>

    <section class="study-main">
        <article class="content-panel active" id="explanationPanel">
            <h2>Antes do jogo</h2>
            <p>{{ explanation }}</p>
            <button class="primary-button big-action" data-target-tab="activityPanel">Comecar jogo</button>
        </article>

        <article class="content-panel" id="activityPanel">
            <div class="activity-header">
                <div>
                    <h2>Jogo rapido</h2>
                    <p id="difficultyLabel">Fase 1</p>
                </div>
                <button class="ghost-button" id="newQuestion">Novo desafio</button>
            </div>

            <div id="activityBox" class="activity-box">
                <p>Toque em "Novo desafio" para comecar.</p>
            </div>

            <div class="answer-area">
                <div id="optionsBox" class="options-box"></div>
                <label id="answerLabel">
                    Resposta
                    <input id="answerInput" type="text" autocomplete="off" placeholder="Digite aqui">
                </label>
                <div class="button-row">
                    <button class="primary-button" id="sendAnswer">Conferir</button>
                    <button class="hint-button" id="hintButton">Ouvir dica</button>
                    <button class="ghost-button" id="retryButton" hidden>Tentar de novo</button>
                </div>
            </div>

            <div id="hintBox" class="hint-box" hidden></div>
            <div id="feedbackBox" class="feedback-box" hidden></div>
        </article>
    </section>
</section>

<script src="{{ url_for('static', filename='js/study.js') }}"></script>
{% endblock %}
