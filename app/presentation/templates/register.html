{% extends "base.html" %}
{% block title %}Cadastro | BrincaSaber{% endblock %}
{% block content %}
<section class="auth-layout">
    <div class="welcome-panel">
        <span class="eyebrow">Bem-vindo</span>
        <h1>Crie sua entrada no BrincaSaber.</h1>
        <p>O app guarda seu caminho para voce continuar depois.</p>
    </div>

    <form class="auth-card" method="post">
        <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
        <h2>Cadastro</h2>
        <label>
            Nome
            <input type="text" name="name" required autocomplete="name">
        </label>
        <label>
            E-mail
            <input type="email" name="email" required autocomplete="email">
        </label>
        <label>
            Senha
            <input type="password" name="password" required minlength="6" autocomplete="new-password">
        </label>
        <button class="primary-button big-action" type="submit">Criar conta</button>
        <p class="switch-auth">Ja tenho conta. <a href="{{ url_for('web.login') }}">Entrar</a></p>
    </form>
</section>
{% endblock %}
